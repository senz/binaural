# Pre-commit hooks for BinauralBeatsExample (Android/Kotlin)
# Install: pip install pre-commit && pre-commit install && pre-commit install --hook-type pre-push
# Run manually: pre-commit run --all-files  (commit); pre-commit run --hook-stage pre-push --all-files (push)

default_language_version:
  python: python3

exclude: '^.*\.svg$'

repos:
  # Generic file fixes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: detect-private-key
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Kotlin: ktlint + detekt via Gradle (single source of truth)
  # Перед первым коммитом выполните: ./gradlew ktlintFormat
  - repo: local
    hooks:
      - id: ktlint-check
        name: ktlint (Kotlin style)
        entry: ./gradlew ktlintCheck
        language: system
        types: [kotlin]
        pass_filenames: false
      - id: detekt
        name: detekt (Kotlin static analysis)
        entry: ./gradlew detekt
        language: system
        types: [kotlin]
        pass_filenames: false

  # Тесты при push (pre-push hook)
  - repo: local
    hooks:
      - id: android-unit-tests
        name: Android unit tests
        entry: ./gradlew test --no-daemon -q
        language: system
        pass_filenames: false
        stages: [pre-push]
