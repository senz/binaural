apply plugin: 'com.android.application'

android {
    namespace 'com.guidedmeditationtreks.binaural'
    compileSdk 34

    defaultConfig {
        applicationId "com.guidedmeditationtreks.binaural"
        minSdk 21
        targetSdk 34
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation 'androidx.core:core:1.12.0'
}